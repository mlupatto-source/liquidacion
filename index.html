<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquidación Marcelo Lupatto</title>
<link rel="manifest" href="manifest.json">

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#1b5e20,#66bb6a);
padding:20px;
color:#1b5e20;
}
h1{
text-align:center;
color:white;
}
.container{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
input,select{
width:100%;
padding:10px;
margin-bottom:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}
.green{
background:#2e7d32;
color:white;
}
.gray{
background:#616161;
color:white;
}
.total{
font-size:24px;
font-weight:bold;
color:black;
margin-top:10px;
}
.label{
font-weight:bold;
margin-bottom:4px;
display:block;
}
</style>
</head>
<body>

<h1>Marcelo Lupatto<br>Liquidación</h1>

<div class="container">

<!-- CLIENTES -->
<label class="label">Clientes (ingrese hasta 5)</label>
<input type="text" id="cliente1" placeholder="Cliente 1">
<input type="text" id="cliente2" placeholder="Cliente 2">
<input type="text" id="cliente3" placeholder="Cliente 3">
<input type="text" id="cliente4" placeholder="Cliente 4">
<input type="text" id="cliente5" placeholder="Cliente 5">
<button class="green" onclick="cargarClientes()">Cargar Clientes</button>

<label class="label" for="clienteSelect">Seleccionar Cliente</label>
<select id="clienteSelect">
  <option value="">-- Seleccione Cliente --</option>
</select>

<!-- FORMA DE COBRO -->
<label class="label">Formas de Cobro (ingrese hasta 5)</label>
<input type="text" id="forma1" placeholder="Forma 1">
<input type="text" id="forma2" placeholder="Forma 2">
<input type="text" id="forma3" placeholder="Forma 3">
<input type="text" id="forma4" placeholder="Forma 4">
<input type="text" id="forma5" placeholder="Forma 5">
<button class="green" onclick="cargarFormas()">Cargar Formas de Cobro</button>

<label class="label" for="formaSelect">Seleccionar Forma de Cobro</label>
<select id="formaSelect">
  <option value="">-- Seleccione Forma --</option>
</select>

<!-- TIPO DE HORA -->
<h3>Tipo de Hora</h3>
<select id="tipoHora" onchange="calcular()">
<option value="normal">Hora Normal</option>
<option value="especial">Hora Especial</option>
</select>

Valor Hora Normal:
<input type="number" id="valorHora" value="14000">

Valor Hora Especial:
<input type="number" id="valorHoraEsp" value="18000">

Valor Kilómetro:
<input type="number" id="valorKm" value="600">

Horas:
<input type="number" id="horas" value="0" oninput="calcular()">

Kilómetros:
<input type="number" id="km" value="0" oninput="calcular()">

Otros:
<input type="number" id="otros" value="0" oninput="calcular()">

<div id="total" class="total"></div>

<button class="gray" onclick="reiniciar()">Reiniciar</button>
<button class="green" onclick="generar()">Compartir por WhatsApp</button>
<button onclick="generarPDF()">Generar PDF</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
// --- CLIENTES ---
function cargarClientes(){
    const clientes = [];
    for(let i=1;i<=5;i++){
        const nombre = document.getElementById('cliente'+i).value.trim();
        if(nombre!=="") clientes.push(nombre);
    }

    const select = document.getElementById('clienteSelect');
    select.innerHTML = '<option value="">-- Seleccione Cliente --</option>';
    clientes.forEach(c=>{
        const opt = document.createElement('option');
        opt.value = c;
        opt.text = c;
        select.appendChild(opt);
    });

    // Guardar en localStorage
    for(let i=1;i<=5;i++){
        localStorage.setItem('cliente'+i, document.getElementById('cliente'+i).value);
    }
}

// --- FORMAS DE COBRO ---
function cargarFormas(){
    const formas = [];
    for(let i=1;i<=5;i++){
        const nombre = document.getElementById('forma'+i).value.trim();
        if(nombre!=="") formas.push(nombre);
    }

    const select = document.getElementById('formaSelect');
    select.innerHTML = '<option value="">-- Seleccione Forma --</option>';
    formas.forEach(f=>{
        const opt = document.createElement('option');
        opt.value = f;
        opt.text = f;
        select.appendChild(opt);
    });

    // Guardar en localStorage
    for(let i=1;i<=5;i++){
        localStorage.setItem('forma'+i, document.getElementById('forma'+i).value);
    }
}

// Cargar clientes y formas guardadas al iniciar
window.addEventListener('load', ()=>{
    // Clientes
    for(let i=1;i<=5;i++){
        const val = localStorage.getItem('cliente'+i);
        if(val) document.getElementById('cliente'+i).value = val;
    }
    cargarClientes();

    // Formas de cobro
    for(let i=1;i<=5;i++){
        const val = localStorage.getItem('forma'+i);
        if(val) document.getElementById('forma'+i).value = val;
    }
    cargarFormas();
});

// --- OTROS CAMPOS ---
function guardarValor(id){
    const el=document.getElementById(id);
    localStorage.setItem(id, el.value);
}
function cargarValor(id){
    const valor=localStorage.getItem(id);
    if(valor!==null){
        document.getElementById(id).value=valor;
    }
}

// Inicializar valores guardados
['valorHora','valorHoraEsp','valorKm','horas','km','otros'].forEach(cargarValor);

// Calcular total
function formato(n){
    return new Intl.NumberFormat('es-AR').format(n);
}

function obtenerValorHora(){
    let tipo=document.getElementById("tipoHora").value;
    let normal=parseFloat(document.getElementById("valorHora").value)||0;
    let esp=parseFloat(document.getElementById("valorHoraEsp").value)||0;
    return tipo==="normal"?normal:esp;
}

function calcular(){
    let vh=obtenerValorHora();
    let vk=parseFloat(document.getElementById("valorKm").value)||0;
    let h=parseFloat(document.getElementById("horas").value)||0;
    let k=parseFloat(document.getElementById("km").value)||0;
    let o=parseFloat(document.getElementById("otros").value)||0;
    let total=(h*vh)+(k*vk)+o;
    document.getElementById("total").innerHTML="TOTAL: $"+formato(total);

    // Guardar valores
    ['valorHora','valorHoraEsp','valorKm','horas','km','otros'].forEach(guardarValor);
}

function reiniciar(){
    ['horas','km','otros'].forEach(id=>document.getElementById(id).value=0);
    calcular();
}

// Compartir por WhatsApp
function generar(){
    let fecha=new Date().toLocaleDateString('es-AR');
    let cliente=document.getElementById("clienteSelect").value;
    let h=document.getElementById("horas").value;
    let k=document.getElementById("km").value;
    let o=document.getElementById("otros").value;
    let total=document.getElementById("total").innerText;
    let forma=document.getElementById("formaSelect").value.toUpperCase();

    let texto=
`LIQUIDACION ${fecha} - ${cliente}

HORAS
Cantidad: ${h}

KILÓMETROS
Cantidad: ${k}

${total}

FORMA DE PAGO: ${forma}

Muchas gracias`;

    navigator.share({text:texto});
}

// Generar PDF
async function generarPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const fecha=new Date().toLocaleDateString('es-AR');
    const cliente=document.getElementById("clienteSelect").value || "";
    const horas=document.getElementById("horas").value||"0";
    const kilometros=document.getElementById("km").value||"0";
    const total=document.getElementById("total").innerText.replace("TOTAL: $","")||"0";
    const formaPago=document.getElementById("formaSelect").value.toUpperCase();

    const img=new Image();
    img.src="icon.png";
    img.onload=function(){
        doc.addImage(img,"PNG",80,10,50,30);

        doc.setFont("helvetica","bold");
        doc.setFontSize(14);
        doc.text("Marcelo Lupatto",105,50,{align:"center"});

        doc.setFont("helvetica","normal");
        doc.setFontSize(11);

        doc.text("Fecha: "+fecha,20,70);
        doc.text(cliente,105,70,{align:"center"});

        doc.text("HORAS",20,85);
        doc.text("Cantidad: "+horas,25,93);

        doc.text("KILÓMETROS",20,105);
        doc.text("Cantidad: "+kilometros,25,113);

        doc.setFont("helvetica","bold");
        doc.text("TOTAL: $"+formato(total),20,130);

        doc.setFont("helvetica","normal");
        doc.text("FORMA DE PAGO: "+formaPago,20,145);

        doc.save("Liquidacion.pdf");
    };
}

// Ejecutar cálculo inicial
calcular();

</script>
</body>
</html>
