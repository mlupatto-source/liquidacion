<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquidación Marcelo Lupatto</title>
<link rel="manifest" href="manifest.json">

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#1b5e20,#66bb6a);
    padding: 20px;
    color: #1b5e20;
}
h1{
    text-align: center;
    font-size: 28px;
    color: white;
}
h2{
    text-align: center;
    font-size: 20px;
    color: white;
}
.container{
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    margin-bottom: 15px;
}
input, select{
    width: calc(100% - 12px);
    padding: 10px;
    margin-bottom: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
button{
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}
button.green{
    background: #2e7d32;
    color: white;
    margin-right: 5px;
}
button.gray{
    background: #616161;
    color: white;
}
button.rowButton{
    width: 48%;
}
.total{
    font-size: 24px;
    font-weight: bold;
    color: black;
    margin-top: 10px;
    text-align: center;
}
.label{
    font-weight: bold;
    margin-bottom: 4px;
    display: block;
}
.blockTitle{
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 8px;
    color: #1b5e20;
    text-align: center;
}
.row{
    display: flex;
    justify-content: space-between;
}
</style>
</head>
<body>

<h1>LIQUIDACIÓN</h1>
<h2>Marcelo Lupatto</h2>

<!-- BLOQUE CLIENTES -->
<div class="container" id="clientesBlock">
    <div class="blockTitle">CLIENTES</div>
    <div class="row">
        <button class="green rowButton" onclick="mostrarCargaClientes()">Carga de Clientes</button>
        <button class="green rowButton" onclick="mostrarSeleccionClientes()">Seleccionar Cliente</button>
    </div>

    <div id="cargaClientes" style="display:none;">
        <label class="label">Cliente 1</label><input type="text" id="cliente1" oninput="guardarCliente(1)">
        <label class="label">Cliente 2</label><input type="text" id="cliente2" oninput="guardarCliente(2)">
        <label class="label">Cliente 3</label><input type="text" id="cliente3" oninput="guardarCliente(3)">
        <label class="label">Cliente 4</label><input type="text" id="cliente4" oninput="guardarCliente(4)">
        <label class="label">Cliente 5</label><input type="text" id="cliente5" oninput="guardarCliente(5)">
        <button class="green" onclick="ocultarCargaClientes()">Aceptar</button>
    </div>

    <div id="seleccionClientes" style="display:none;">
        <select id="clienteSelect"></select>
        <button class="green" onclick="aceptarCliente()">Aceptar</button>
    </div>
</div>

<!-- BLOQUE FORMA DE COBRO -->
<div class="container" id="formaCobroBlock">
    <div class="blockTitle">FORMA DE COBRO</div>
    <div class="row">
        <button class="green rowButton" onclick="mostrarCargaFormas()">Carga de Forma de Cobro</button>
        <button class="green rowButton" onclick="mostrarSeleccionFormas()">Seleccionar Forma</button>
    </div>

    <div id="cargaFormas" style="display:none;">
        <label class="label">Forma 1</label><input type="text" id="forma1" oninput="guardarForma(1)">
        <label class="label">Forma 2</label><input type="text" id="forma2" oninput="guardarForma(2)">
        <label class="label">Forma 3</label><input type="text" id="forma3" oninput="guardarForma(3)">
        <label class="label">Forma 4</label><input type="text" id="forma4" oninput="guardarForma(4)">
        <label class="label">Forma 5</label><input type="text" id="forma5" oninput="guardarForma(5)">
        <button class="green" onclick="ocultarCargaFormas()">Aceptar</button>
    </div>

    <div id="seleccionFormas" style="display:none;">
        <select id="formaSelect"></select>
        <button class="green" onclick="aceptarForma()">Aceptar</button>
    </div>
</div>

<!-- BLOQUE DETALLES DE SERVICIO -->
<div class="container" id="detallesBlock">
    <div class="blockTitle">DETALLES DE SERVICIO</div>

    <label class="label" for="tipoHora">Tipo de Hora</label>
    <select id="tipoHora" onchange="calcular()">
        <option value="normal">Hora Normal</option>
        <option value="especial">Hora Especial</option>
    </select>

    <label class="label">Valor Hora Normal</label>
    <input type="number" id="valorHora" value="14000" oninput="calcular()">

    <label class="label">Valor Hora Especial</label>
    <input type="number" id="valorHoraEsp" value="18000" oninput="calcular()">

    <label class="label">Valor Kilómetro</label>
    <input type="number" id="valorKm" value="600" oninput="calcular()">

    <label class="label">Horas</label>
    <input type="number" id="horas" value="0" oninput="calcular()">

    <label class="label">Kilómetros</label>
    <input type="number" id="km" value="0" oninput="calcular()">

    <label class="label">Otros</label>
    <input type="number" id="otros" value="0" oninput="calcular()">

    <div id="total" class="total"></div>

    <div class="row" style="justify-content:center;">
        <button class="gray rowButton" onclick="reiniciar()">Reiniciar</button>
        <button class="green rowButton" onclick="generar()">Compartir por WhatsApp</button>
        <button class="green rowButton" onclick="generarPDF()">Generar PDF</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
// ---------------- CLIENTES ----------------
function guardarCliente(n){
    localStorage.setItem('cliente'+n, document.getElementById('cliente'+n).value);
}
function mostrarCargaClientes(){
    document.getElementById('cargaClientes').style.display='block';
    document.getElementById('seleccionClientes').style.display='none';
}
function ocultarCargaClientes(){
    document.getElementById('cargaClientes').style.display='none';
    actualizarSelectClientes();
}
function mostrarSeleccionClientes(){
    document.getElementById('seleccionClientes').style.display='block';
    document.getElementById('cargaClientes').style.display='none';
}
function actualizarSelectClientes(){
    const select=document.getElementById('clienteSelect');
    select.innerHTML='';
    for(let i=1;i<=5;i++){
        const val=localStorage.getItem('cliente'+i)||'';
        const option=document.createElement('option');
        option.value=val;
        option.text=val;
        select.appendChild(option);
    }
}
function aceptarCliente(){
    const sel=document.getElementById('clienteSelect');
    document.getElementById('clienteSelect').style.display='none';
    sel.style.display='block';
    document.getElementById('clienteSelect').value=sel.value;
    document.getElementById('seleccionClientes').style.display='none';
    document.getElementById('cliente').value=sel.value;
    localStorage.setItem('clienteSeleccion', sel.value);
}

// ---------------- FORMAS DE COBRO ----------------
function guardarForma(n){
    localStorage.setItem('forma'+n, document.getElementById('forma'+n).value);
}
function mostrarCargaFormas(){
    document.getElementById('cargaFormas').style.display='block';
    document.getElementById('seleccionFormas').style.display='none';
}
function ocultarCargaFormas(){
    document.getElementById('cargaFormas').style.display='none';
    actualizarSelectFormas();
}
function mostrarSeleccionFormas(){
    document.getElementById('seleccionFormas').style.display='block';
    document.getElementById('cargaFormas').style.display='none';
}
function actualizarSelectFormas(){
    const select=document.getElementById('formaSelect');
    select.innerHTML='';
    for(let i=1;i<=5;i++){
        const val=localStorage.getItem('forma'+i)||'';
        const option=document.createElement('option');
        option.value=val;
        option.text=val;
        select.appendChild(option);
    }
}
function aceptarForma(){
    const sel=document.getElementById('formaSelect');
    document.getElementById('formaSelect').value=sel.value;
    document.getElementById('seleccionFormas').style.display='none';
    localStorage.setItem('formaSeleccion', sel.value);
}

// ---------------- VALORES Y CALCULO ----------------
function formato(n){
    return new Intl.NumberFormat('es-AR').format(n);
}

function obtenerValorHora(){
    let tipo=document.getElementById("tipoHora").value;
    let normal=parseFloat(document.getElementById("valorHora").value)||0;
    let esp=parseFloat(document.getElementById("valorHoraEsp").value)||0;
    return tipo==="normal"?normal:esp;
}

function calcular(){
    let vh=obtenerValorHora();
    let vk=parseFloat(document.getElementById("valorKm").value)||0;
    let h=parseFloat(document.getElementById("horas").value)||0;
    let k=parseFloat(document.getElementById("km").value)||0;
    let o=parseFloat(document.getElementById("otros").value)||0;
    let total=(h*vh)+(k*vk)+o;
    document.getElementById("total").innerHTML="TOTAL: $"+formato(total);

    ['tipoHora','valorHora','valorHoraEsp','valorKm','horas','km','otros'].forEach(id=>{
        localStorage.setItem(id, document.getElementById(id).value);
    });
}

// Cargar valores guardados
['clienteSeleccion','formaSeleccion','cliente1','cliente2','cliente3','cliente4','cliente5',
 'forma1','forma2','forma3','forma4','forma5','tipoHora','valorHora','valorHoraEsp','valorKm','horas','km','otros'].forEach(id=>{
    const val=localStorage.getItem(id);
    if(val!==null){
        const el=document.getElementById(id);
        if(el) el.value=val;
    }
});

// Inicializar selects
actualizarSelectClientes();
actualizarSelectFormas();

// ---------------- REINICIAR ----------------
function reiniciar(){
    ['horas','km','otros'].forEach(id=>document.getElementById(id).value=0);
    calcular();
}

// ---------------- WHATSAPP ----------------
function generar(){
    let fecha=new Date().toLocaleDateString('es-AR');
    let cliente=document.getElementById("cliente").value;
    let h=document.getElementById("horas").value;
    let k=document.getElementById("km").value;
    let o=document.getElementById("otros").value;
    let total=document.getElementById("total").innerText;
    let forma=document.getElementById("formaSelect").value||'';

    let texto=
`LIQUIDACION ${fecha} - ${cliente}

HORAS
Cantidad: ${h}

KILÓMETROS
Cantidad: ${k}

${total}

FORMA DE PAGO: ${forma}

Muchas gracias`;

    navigator.share({text:texto});
}

// ---------------- PDF ----------------
async function generarPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const fecha=new Date().toLocaleDateString('es-AR');
    const cliente=document.getElementById("cliente").value;
    const horas=document.getElementById("horas").value||"0";
    const kilometros=document.getElementById("km").value||"0";
    const total=document.getElementById("total").innerText.replace("TOTAL: $","")||"0";
    const formaPago=document.getElementById("formaSelect").value||'';

    // Márgenes y posiciones
    const margenSuperior=25;
    const margenLateral=20;
    const alturaLinea=10;
    let yPos=margenSuperior;

    // Marco superior
    doc.setLineWidth(0.8);
    doc.rect(margenLateral, yPos-10, 170, 30); // ancho 170 aprox
    yPos+=20;

    doc.setFont("helvetica","bold");
    doc.setFontSize(22);
    doc.text("LIQUIDACIÓN",105,yPos,{align:"center"});
    yPos+=10;

    doc.setFont("helvetica","normal");
    doc.setFontSize(16);
    doc.text("Marcelo Lupatto",105,yPos,{align:"center"});
    yPos+=20;

    // Marco inferior
    let totalAlto= yPos+alturaLinea*10; 
    doc.setLineWidth(0.8);
    doc.rect(margenLateral, yPos-5, 170, totalAlto-yPos+25);

    // Detalles
    doc.setFont("helvetica","normal");
    doc.setFontSize(12);
    doc.text(`Fecha: ${fecha}`,105,yPos,{align:"center"});
    yPos+=alturaLinea;
    doc.text(`Cliente: ${cliente}`,105,yPos,{align:"center"});
    yPos+=alturaLinea*2;
    doc.text(`HORAS`,105,yPos,{align:"center"});
    yPos+=alturaLinea;
    doc.text(`Cantidad: ${horas}`,105,yPos,{align:"center"});
    yPos+=alturaLinea*2;
    doc.text(`KILÓMETROS`,105,yPos,{align:"center"});
    yPos+=alturaLinea;
    doc.text(`Cantidad: ${kilometros}`,105,yPos,{align:"center"});
    yPos+=alturaLinea*2;
    doc.setFont("helvetica","bold");
    doc.text(`TOTAL: $${total}`,105,yPos,{align:"center"});
    yPos+=alturaLinea*2;
    doc.setFont("helvetica","bold");
    doc.text(`FORMA DE PAGO: ${formaPago}`,105,yPos,{align:"center"});
    yPos+=alturaLinea*2;
    doc.setFont("helvetica","normal");
    doc.text("Muchas gracias",105,yPos,{align:"center"});

    doc.save("Liquidacion.pdf");
}

// Ejecutar cálculo inicial
calcular();

</script>
</body>
</html>
